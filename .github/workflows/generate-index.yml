name: Generate Repository Index

on:
  push:
    branches:
      - main # Cambia a 'master' si tu rama principal usa ese nombre

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate index.txt
      env:
        # Pasamos las variables de GitHub a variables de entorno de Bash seguras
        REPO_NAME: ${{ github.repository }}
        BRANCH_NAME: ${{ github.ref_name }}
      run: |
        # Vacía o crea el archivo index.txt
        > index.txt
        
        # Busca todos los archivos, excluye carpetas ocultas e index.txt, y los ordena alfabéticamente
        find . -type f -not -path '*/.*' -not -name 'index.txt' | sed 's|^\./||' | sort | while read -r file; do
          # Codifica la ruta del archivo para que sea una URL válida
          url_encoded=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$file'''))")
          
          # Construye la URL raw usando las variables de entorno de Bash ($REPO_NAME y $BRANCH_NAME)
          raw_url="https://githubusercontent.com{REPO_NAME}/${BRANCH_NAME}/${url_encoded}"
          
          # Escribe la línea final en texto plano
          echo "${file} -- [${raw_url}]" >> index.txt
        done

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.txt
        # Hace commit solo si index.txt cambió, evitando bucles infinitos
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update index.txt [skip ci]" && git push)
