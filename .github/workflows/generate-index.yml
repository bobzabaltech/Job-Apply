name: Generate Repository Index

on:
  push:
    branches:
      - main # Cambia a 'master' si tu rama principal usa ese nombre

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate index.txt
      run: |
        # Vacía o crea el archivo index.txt de texto plano
        > index.txt
        
        # Busca todos los archivos, excluye carpetas ocultas e index.txt, y los ordena alfabéticamente
        find . -type f -not -path '*/.*' -not -name 'index.txt' | sed 's|^\./||' | sort | while read -r file; do
          # Codifica la ruta para que sea una URL válida de internet
          url_encoded=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$file'''))")
          
          # Construye la URL cruda usando las variables de entorno oficiales del sistema operativo de GitHub
          raw_url="https://githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/${url_encoded}"
          
          # Escribe el archivo final en texto plano
          echo "${file} -- [${raw_url}]" >> index.txt
        done

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.txt
        # Solo hace commit e imprime en el repositorio si el index.txt cambió realmente
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update index.txt [skip ci]" && git push)
