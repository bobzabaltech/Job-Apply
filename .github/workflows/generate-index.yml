name: Generate Repository Index

on:
  push:
    branches:
      - main # Cambia a 'master' si tu rama principal se llama así

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate index.html
      run: |
        echo "<!DOCTYPE html>" > index.html
        echo "<html><head><title>Index del Repositorio</title></head><body>" >> index.html
        echo "<pre>" >> index.html
        
        # Busca todos los archivos clonados, excluyendo la carpeta .git y el propio index.html
        find . -type f -not -path '*/.*' -not -name 'index.html' | sed 's|^\./||' | while read -r file; do
          # Codifica la ruta para que sea una URL válida
          url_encoded=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$file'''))")
          # Construye la URL raw oficial de GitHub para el archivo
          raw_url="https://githubusercontent.com{{ github.repository }}/${{ github.ref_name }}/${url_encoded}"
          # Escribe la línea con el formato solicitado
          echo "${file} -- [${raw_url}]" >> index.html
        done
        
        echo "</pre>" >> index.html
        echo "</body></html>" >> index.html

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add index.html
        # Solo hace commit si el archivo index.html cambió para evitar bucles infinitos
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update index.html [skip ci]" && git push)
